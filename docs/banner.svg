<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1536 500" width="1536" height="500">
  <defs>
    <!-- Exact browser-harness ink technique: fractalNoise + scale=120 -->
    <filter id="ink" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="3" seed="7" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="120" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <!-- Secondary glow filter -->
    <filter id="glow" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Ink reveal mask — circle grows 0 → 1100 with ink-bleed edges -->
    <mask id="reveal">
      <rect width="1536" height="500" fill="black"/>
      <circle cx="768" cy="250" r="0" fill="white" filter="url(#ink)">
        <animate attributeName="r" values="0;0;1100"
                 keyTimes="0;0.0909;1"
                 dur="11s" fill="freeze"
                 calcMode="spline" keySplines="0 0 1 1; 0.22 0.61 0.36 1"/>
      </circle>
    </mask>
  </defs>

  <!-- Background — always visible, no mask -->
  <rect width="1536" height="500" fill="#0d1117"/>

  <!-- All content revealed with ink mask -->
  <g mask="url(#reveal)">

    <!-- Terrain grid lines (subtle) -->
    <line x1="0" y1="420" x2="1536" y2="420" stroke="#1a2332" stroke-width="1"/>
    <line x1="0" y1="390" x2="1536" y2="390" stroke="#1a2332" stroke-width="0.5"/>
    <line x1="0" y1="360" x2="1536" y2="360" stroke="#1a2332" stroke-width="0.5"/>
    <!-- Vertical grid -->
    <line x1="200" y1="300" x2="200" y2="500" stroke="#1a2332" stroke-width="0.5"/>
    <line x1="400" y1="300" x2="400" y2="500" stroke="#1a2332" stroke-width="0.5"/>
    <line x1="600" y1="300" x2="600" y2="500" stroke="#1a2332" stroke-width="0.5"/>
    <line x1="800" y1="300" x2="800" y2="500" stroke="#1a2332" stroke-width="0.5"/>
    <line x1="1000" y1="300" x2="1000" y2="500" stroke="#1a2332" stroke-width="0.5"/>
    <line x1="1200" y1="300" x2="1200" y2="500" stroke="#1a2332" stroke-width="0.5"/>

    <!-- Mars-like planet orb (right side) -->
    <circle cx="1300" cy="220" r="180" fill="#1a0f0a" opacity="0.9"/>
    <circle cx="1300" cy="220" r="180" fill="none" stroke="#c8420a" stroke-width="2" opacity="0.6"/>
    <circle cx="1300" cy="220" r="160" fill="none" stroke="#c8420a" stroke-width="0.5" opacity="0.3"/>
    <!-- Planet rings/texture lines -->
    <ellipse cx="1300" cy="220" rx="180" ry="50" fill="none" stroke="#c8420a" stroke-width="1.5" opacity="0.4"/>
    <ellipse cx="1300" cy="220" rx="180" ry="80" fill="none" stroke="#8b3a0a" stroke-width="0.5" opacity="0.25"/>

    <!-- Stars -->
    <circle cx="80" cy="60" r="1.5" fill="#ffffff" opacity="0.6"/>
    <circle cx="220" cy="40" r="1" fill="#ffffff" opacity="0.4"/>
    <circle cx="450" cy="80" r="2" fill="#c8f135" opacity="0.5"/>
    <circle cx="600" cy="30" r="1" fill="#ffffff" opacity="0.3"/>
    <circle cx="900" cy="55" r="1.5" fill="#00e5ff" opacity="0.4"/>
    <circle cx="1050" cy="25" r="1" fill="#ffffff" opacity="0.5"/>
    <circle cx="1150" cy="70" r="2" fill="#c8f135" opacity="0.3"/>
    <circle cx="1400" cy="45" r="1.5" fill="#ffffff" opacity="0.4"/>
    <circle cx="160" cy="130" r="1" fill="#ffffff" opacity="0.3"/>
    <circle cx="500" cy="150" r="1.5" fill="#00e5ff" opacity="0.3"/>
    <circle cx="700" cy="90" r="1" fill="#ffffff" opacity="0.4"/>
    <circle cx="1480" cy="130" r="1" fill="#ffffff" opacity="0.3"/>

    <!-- Accent top bar -->
    <rect x="60" y="55" width="140" height="2" fill="#c8f135" rx="1"/>

    <!-- MAIN TITLE -->
    <text x="60" y="230"
          font-family="'Courier New',Courier,monospace"
          font-size="130"
          font-weight="900"
          fill="#c8f135">ANT ON MARS</text>

    <!-- Subtitle -->
    <text x="64" y="285"
          font-family="'Courier New',Courier,monospace"
          font-size="18"
          fill="#58a6ff"
          letter-spacing="6">THREE.JS WEBGPU  ·  RAPIER PHYSICS  ·  VANILLA JS  ·  MESHY AI</text>

    <!-- Brand stamp bottom-left -->
    <rect x="60" y="390" width="220" height="52" fill="none" stroke="#c8f135" stroke-width="1.5" rx="2"/>
    <text x="72" y="410" font-family="'Courier New',monospace" font-size="11" fill="#c8f135">• ANT ON MARS •</text>
    <text x="72" y="428" font-family="'Courier New',monospace" font-size="10" fill="#58a6ff">[THREE.JS/Y]  [RAPIER/Y]</text>
    <text x="72" y="444" font-family="'Courier New',monospace" font-size="9" fill="#30363d">SOUTH HUSTLES  #001</text>

    <!-- Pulse dots -->
    <circle cx="64" cy="335" r="5" fill="#c8f135" filter="url(#glow)">
      <animate attributeName="opacity" values="1;0.2;1" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="80" cy="335" r="5" fill="#00e5ff" filter="url(#glow)">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="96" cy="335" r="5" fill="#c8f135" filter="url(#glow)">
      <animate attributeName="opacity" values="0.6;0.2;1" dur="2.6s" repeatCount="indefinite"/>
    </circle>

  </g>
</svg>
